<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifact 演示 — OpenClaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#F7F7F8;--surface:#fff;--border:#E5E7EB;--text:#0F172A;--text-muted:#64748B;--primary:#2563EB;--primary-hover:#1D4ED8;--success:#16A34A;--warning:#D97706;--error:#DC2626; }
    * { font-family:'Inter',system-ui,sans-serif; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; margin:0; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#D1D5DB; border-radius:3px; }

    /* Nav */
    #left-nav { width:64px; overflow:hidden; transition:width 0.26s cubic-bezier(0.4,0,0.2,1); }
    #left-nav.expanded { width:220px; }
    .nav-btn { display:flex;align-items:center;width:100%;border:none;background:transparent;cursor:pointer;border-radius:9px;padding:4px;transition:background 0.14s; }
    .nav-btn:hover { background:#F1F5F9; }
    .nav-btn.active { background:#EFF6FF; }
    .nav-btn.active .nav-icon-wrap { color:#2563EB; }
    .nav-btn.active .nav-label { color:#2563EB; }
    .nav-icon-wrap { width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#94A3B8;transition:color 0.14s; }
    .nav-btn:hover .nav-icon-wrap { color:#475569; }
    .nav-label { opacity:0;max-width:0;overflow:hidden;white-space:nowrap;font-size:14px;font-weight:500;color:var(--text-muted);transition:opacity 0.18s ease,max-width 0.22s ease; }
    #left-nav.expanded .nav-label { opacity:1;max-width:180px; }

    /* Avatar */
    .av-blue   { background:linear-gradient(135deg,#DBEAFE,#BFDBFE); }
    .av-green  { background:linear-gradient(135deg,#DCFCE7,#BBF7D0); }
    .av-purple { background:linear-gradient(135deg,#EDE9FE,#DDD6FE); }
    .av-amber  { background:linear-gradient(135deg,#FEF3C7,#FDE68A); }
    .av-rose   { background:linear-gradient(135deg,#FFE4E6,#FECDD3); }

    /* Chat messages */
    .bubble-user { background:#2563EB;color:#fff;border-radius:12px 0 12px 12px;padding:10px 14px;font-size:14px;line-height:1.65;word-break:break-word;max-width:85%; }
    .bubble-bot  { background:#F1F5F9;color:var(--text);border-radius:0 12px 12px 12px;padding:10px 14px;font-size:14px;line-height:1.65;word-break:break-word;max-width:88%; }
    .msg-code { background:#1E293B;color:#E2E8F0;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 13px;border-radius:7px;margin-top:7px;white-space:pre;overflow-x:auto;line-height:1.6; }

    /* Artifact gallery card */
    .art-card { border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.18s cubic-bezier(0.4,0,0.2,1);background:#fff;display:flex;align-items:center;gap:10px; }
    .art-card:hover { border-color:#93C5FD;box-shadow:0 4px 12px rgba(37,99,235,0.1);transform:translateY(-1px); }
    .art-card.active { border-color:#2563EB;background:#F0F7FF;box-shadow:0 0 0 3px rgba(37,99,235,0.12); }
    .art-type-badge { display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#F1F5F9;color:#64748B;margin-top:3px; }

    /* Artifact viewer tabs */
    .atab { padding:9px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:5px; }
    .atab:hover { color:var(--text); }
    .atab.active { color:#2563EB;border-bottom-color:#2563EB; }

    /* Code viewer */
    .code-view { font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;background:#1E293B;color:#E2E8F0;height:100%;padding:20px;overflow:auto;margin:0;white-space:pre; }

    /* History items */
    .hist-item { padding:14px 16px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background 0.12s; }
    .hist-item:hover { background:#F8FAFC; }
    .hist-item.cur { border-left:3px solid #2563EB;background:#F0F7FF;padding-left:13px; }

    /* Iterate input */
    .iter-input { width:100%;border:none;outline:none;background:transparent;font-size:13px;color:var(--text);font-family:'Inter',sans-serif; }

    /* Typing */
    .tdot { width:7px;height:7px;border-radius:50%;background:#94A3B8;animation:td 1.4s ease-in-out infinite; }
    .tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}
    @keyframes td { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Fade in */
    @keyframes mfade { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .mrow { animation:mfade 0.2s ease; }

    /* Version badge */
    .vbadge { display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#DBEAFE;color:#1D4ED8; }

    /* Refresh animate */
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinning { animation:spin 1s linear infinite; }

    /* Toast */
    .toast { position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:999;transform:translateY(16px);opacity:0;transition:all 0.22s ease;pointer-events:none; }
    .toast.show { transform:translateY(0);opacity:1; }
    .toast-success { background:#fff;color:#15803D;border-left:4px solid #16A34A; }
    .toast-error   { background:#fff;color:#B91C1C;border-left:4px solid #DC2626; }

    /* Split view */
    .split-left { flex:1;overflow-y:auto;border-right:1px solid var(--border);background:#F8FAFC; }
    .split-right { flex:1;overflow:hidden; }
  </style>
</head>
<body style="display:flex;height:100vh;overflow:hidden;">

<!-- ══ NAV ══ -->
<nav id="left-nav" style="background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 0;flex-shrink:0;z-index:10;">
  <div style="display:flex;align-items:center;padding:0 14px;margin-bottom:14px;height:36px;min-width:220px;">

    <button class="nav-btn" onclick="window.open('ui-bot-management.html','_blank')">
      <div class="nav-icon-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/></svg></div>

      <span class="nav-label">私聊</span>

    <button class="nav-btn" onclick="window.open('ui-group-chat.html','_blank')">
      <div class="nav-icon-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <span class="nav-label">群聊</span>

      <span class="nav-label">Artifact 演示</span>
    </button>
  </div>
  <div style="padding:0 10px;border-top:1px solid #F1F5F9;padding-top:8px;margin-top:4px;min-width:220px;display:flex;flex-direction:column;gap:2px;">
    <button class="nav-btn">
      <div class="nav-icon-wrap">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <span class="nav-label">设置</span>
    </button>
    <button class="nav-btn" onclick="toggleNav()">
      <div class="nav-icon-wrap" id="nav-toggle-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></div>
      <span class="nav-label" id="nav-toggle-label">收起</span>
    </button>
  </div>
</nav>

<!-- ══ CHAT PANEL (left) ══ -->
<div style="width:360px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;">
  <!-- Header -->
  <div style="padding:14px 16px;border-bottom:1px solid #F1F5F9;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
      <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;" class="av-blue">🤖</div>
      <span style="font-size:14px;font-weight:600;">CodeMaster</span>
      <span style="font-size:11px;padding:1px 7px;border-radius:20px;background:#DCFCE7;color:#15803D;font-weight:600;">已连接</span>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin:0;">展示 Artifact 从生成到迭代的完整工作流</p>
  </div>
  <!-- Messages -->
  <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;"></div>
  <!-- Input -->
  <div style="padding:10px 12px;border-top:1px solid #F1F5F9;flex-shrink:0;">
    <div style="background:#F8FAFC;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;">
      <input id="chat-inp" type="text" placeholder="继续优化 Artifact..." style="flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text);" onkeydown="if(event.key==='Enter')iterateArtifact()" />
      <button onclick="iterateArtifact()" style="width:28px;height:28px;background:#2563EB;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ ARTIFACT VIEWER (main) ══ -->
<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;">

  <!-- Gallery bar -->
  <div style="background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M14 8h3"/><path d="M14 12h3"/></svg>
      <span style="font-size:14px;font-weight:600;">Artifact 工作区</span>
      <span id="current-art-badge" style="font-size:11px;padding:1px 8px;border-radius:20px;background:#DBEAFE;color:#1D4ED8;font-weight:600;"></span>
      <span id="current-art-emoji" style="font-size:14px;"></span>
      <span id="current-art-name" style="font-size:13px;font-weight:500;color:var(--text);"></span>
      <span id="current-art-type" class="art-type-badge"></span>
      <span id="current-art-creator" style="font-size:12px;color:var(--text-muted);"></span>
    </div>
    <!-- Gallery -->
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;" id="art-gallery"></div>
  </div>

  <!-- Viewer area -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- Tabs -->
    <div style="background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;">
      <div class="atab active" id="atab-preview" onclick="switchTab('preview')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>预览
      </div>
      <div class="atab" id="atab-code" onclick="switchTab('code')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>代码
      </div>
      <div class="atab" id="atab-history" onclick="switchTab('history')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>历史
      </div>
      <div class="atab" id="atab-split" onclick="switchTab('split')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>分屏
      </div>
      <!-- Actions -->
      <div style="margin-left:auto;display:flex;gap:4px;align-items:center;">
        <button id="refresh-btn" onclick="refreshPreview()" style="display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='transparent'">
          <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          刷新
        </button>
        <button onclick="copyCode()" style="display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background='transparent'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
        <button onclick="openFullscreen()" style="display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--primary);background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='#DBEAFE'" onmouseout="this.style.background='#EFF6FF'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          全屏
        </button>
      </div>
    </div>

    <!-- Content panels -->
    <div style="flex:1;position:relative;overflow:hidden;">
      <!-- Preview -->
      <div id="panel-preview" style="position:absolute;inset:0;">
        <iframe id="art-iframe" style="width:100%;height:100%;border:none;display:block;" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
      <!-- Code -->
      <div id="panel-code" style="display:none;position:absolute;inset:0;overflow:auto;">
        <pre id="code-content" class="code-view"></pre>
      </div>
      <!-- History -->
      <div id="panel-history" style="display:none;position:absolute;inset:0;overflow-y:auto;background:#fff;">
        <div style="padding:20px;">
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">点击版本可在预览中查看</p>
          <div id="hist-list"></div>
        </div>
      </div>
      <!-- Split -->
      <div id="panel-split" style="display:none;position:absolute;inset:0;display:flex;">
        <div class="split-left">
          <pre id="split-code" class="code-view" style="height:100%;"></pre>
        </div>
        <div class="split-right">
          <iframe id="split-iframe" style="width:100%;height:100%;border:none;" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ══════════ ARTIFACTS DATA ══════════
const ARTS = [
  {

      { v:'v1', desc:'初始 KPI 卡片布局', time:'15 分钟前' },
    ],
    html: `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>

.table-header{display:grid;grid-template-columns:1fr 80px 80px 90px;padding:10px 14px;background:#F8FAFC;font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.05em}

    if (m.role==='user') {
      div.style.cssText = 'display:flex;justify-content:flex-end;';
      div.innerHTML = `<div class="bubble-user">${m.text}</div>`;
    } else {
      const botEmojis = {cm:'🤖',dv:'📊',ui:'🎨'};
      const botNames  = {cm:'CodeMaster',dv:'DataViz',ui:'UIDesign'};
      const botClass  = {cm:'av-blue',dv:'av-purple',ui:'av-amber'};
      div.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
      div.innerHTML = `
        <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;" class="${botClass[m.bot]}">${botEmojis[m.bot]}</div>
        <div>
          <div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-muted);">${botNames[m.bot]}</div>
          <div class="bubble-bot">${m.text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>
        </div>`;
    }
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

// ══════════ ITERATE ARTIFACT ══════════
function iterateArtifact() {
  const inp  = document.getElementById('chat-inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const el = document.getElementById('chat-msgs');

  // Add user message
  const umsg = document.createElement('div');
  umsg.className = 'mrow'; umsg.style.cssText = 'display:flex;justify-content:flex-end;';
  umsg.innerHTML = `<div class="bubble-user">${text}</div>`;
  el.appendChild(umsg); el.scrollTop = el.scrollHeight;

  // Show typing
  const typing = document.createElement('div');
  typing.className = 'mrow'; typing.id = 'typing'; typing.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
  typing.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#DBEAFE,#BFDBFE);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🤖</div>
    <div><div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-muted);">CodeMaster</div>
    <div class="bubble-bot" style="display:flex;gap:5px;align-items:center;"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div>`;
  el.appendChild(typing); el.scrollTop = el.scrollHeight;

  setTimeout(() => {
    typing.remove();
    const reply = `好的！已根据你的要求更新了 Artifact。\n\n**本次修改**：${text}\n\n版本已升级 → 查看 Artifact 预览获取最新版本。`;
    const rmsg = document.createElement('div');
    rmsg.className = 'mrow'; rmsg.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
    rmsg.innerHTML = `
      <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#DBEAFE,#BFDBFE);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🤖</div>
      <div>
        <div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-muted);">CodeMaster</div>
        <div class="bubble-bot">${reply.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>
      </div>`;
    el.appendChild(rmsg); el.scrollTop = el.scrollHeight;
    showToast('Artifact 已更新 (模拟)', true);
  }, 1400);
}

// ══════════ TOAST ══════════
let toastT;
function showToast(msg, okOrType='success') {
  const type = okOrType === true ? 'success' : okOrType === false ? 'error' : okOrType;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  clearTimeout(toastT);
  toastT = setTimeout(() => { el.classList.remove('show'); }, 2800);
}

// ══════════ INIT ══════════
loadArtifact('dashboard');
switchTab('preview');
</script>
