<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lysmata Artifact 体验</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --border: #e2e8f0;
        --text: #0f172a;
        --text-muted: #64748b;
        --primary: #2563eb;
        --primary-soft: #eff6ff;
        --success: #16a34a;
        --warning: #d97706;
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 999px;
      }

      #left-nav {
        width: 72px;
        transition: width 0.24s ease;
        overflow: hidden;
        background: #fff;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 12px 0;
        flex-shrink: 0;
      }

      #left-nav.expanded {
        width: 228px;
      }

      .nav-btn {
        width: calc(100% - 20px);
        margin: 0 10px;
        border: none;
        border-radius: 12px;
        background: transparent;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 8px;
        color: var(--text-muted);
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      .nav-btn:hover {
        background: #f1f5f9;
        color: var(--text);
      }

      .nav-btn.active {
        background: #eff6ff;
        color: var(--primary);
      }

      .nav-icon-wrap {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .nav-label {
        opacity: 0;
        max-width: 0;
        overflow: hidden;
        white-space: nowrap;
        font-size: 14px;
        font-weight: 600;
        transition:
          opacity 0.2s ease,
          max-width 0.2s ease;
      }

      #left-nav.expanded .nav-label {
        opacity: 1;
        max-width: 188px;
      }

      .nav-bottom {
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid #f1f5f9;
      }

      .layout {
        flex: 1;
        display: flex;
        min-width: 0;
      }

      .conversation-rail {
        width: 280px;
        flex-shrink: 0;
        background: #fff;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .chat-shell {
        flex: 1;
        min-width: 0;
        display: flex;
        background: var(--bg);
      }

      .chat-pane {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        transition: width 0.22s ease;
      }

      .artifact-panel {
        width: 0;
        min-width: 0;
        opacity: 0;
        transform: translateX(28px);
        transition:
          width 0.24s ease,
          opacity 0.2s ease,
          transform 0.24s ease;
        border-left: 1px solid transparent;
        background: #fff;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .chat-shell.has-artifact .artifact-panel {
        width: 44%;
        opacity: 1;
        transform: translateX(0);
        border-left-color: var(--border);
      }

      .chat-shell.fullscreen .chat-pane,
      .chat-shell.fullscreen .conversation-rail {
        display: none;
      }

      .chat-shell.fullscreen .artifact-panel {
        width: 100%;
        opacity: 1;
        transform: translateX(0);
        border-left-color: transparent;
      }

      .section-title {
        font-size: 15px;
        font-weight: 600;
      }

      .muted {
        color: var(--text-muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge-phase {
        background: #f1f5f9;
        color: #64748b;
      }

      .badge-artifact {
        background: #ecfdf5;
        color: #15803d;
      }

      .conv-item {
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        border: 1px solid transparent;
      }

      .conv-item:hover {
        background: #f8fafc;
      }

      .conv-item.active {
        background: #eff6ff;
        border-color: #bfdbfe;
      }

      .bubble-user,
      .bubble-bot {
        max-width: 86%;
        border-radius: 16px;
        padding: 12px 14px;
        line-height: 1.65;
        font-size: 14px;
        word-break: break-word;
      }

      .bubble-user {
        background: var(--primary);
        color: #fff;
        border-top-right-radius: 4px;
      }

      .bubble-bot {
        background: #fff;
        color: var(--text);
        border: 1px solid #e2e8f0;
        border-top-left-radius: 4px;
      }

      .msg-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        animation: fade-up 0.18s ease;
      }

      .artifact-card {
        margin-top: 10px;
        border: 1px solid #bfdbfe;
        background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
      }

      .artifact-card:hover {
        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.12);
      }

      .artifact-thumb {
        height: 112px;
        border-radius: 10px;
        border: 1px solid #dbeafe;
        background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
        overflow: hidden;
        position: relative;
      }

      .artifact-thumb::after {
        content: "Preview";
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 11px;
        font-weight: 700;
        color: #2563eb;
        background: rgba(255, 255, 255, 0.92);
        padding: 3px 8px;
        border-radius: 999px;
      }

      .artifact-mini-ui {
        position: absolute;
        inset: 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #dbeafe;
        padding: 10px;
      }

      .mini-top {
        height: 10px;
        width: 48%;
        border-radius: 999px;
        background: #dbeafe;
        margin-bottom: 10px;
      }

      .mini-row {
        height: 8px;
        border-radius: 999px;
        background: #e2e8f0;
        margin-bottom: 8px;
      }

      .mini-row.short {
        width: 56%;
      }

      .mini-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .mini-box {
        height: 36px;
        border-radius: 8px;
        background: linear-gradient(135deg, #eff6ff, #dbeafe);
      }

      .input-shell {
        background: #fff;
        border-top: 1px solid var(--border);
        padding: 14px 18px 16px;
      }

      .input-box {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 14px;
      }

      textarea {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        resize: none;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        min-height: 26px;
        max-height: 120px;
      }

      .ghost-btn,
      .primary-btn,
      .icon-btn {
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .ghost-btn {
        background: #f1f5f9;
        color: #475569;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .primary-btn {
        background: var(--primary);
        color: #fff;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 600;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        background: #f8fafc;
        color: #64748b;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 18px;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 14px 10px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        border-bottom: 2px solid transparent;
        cursor: pointer;
      }

      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      .artifact-body {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .artifact-view {
        height: 100%;
        display: none;
      }

      .artifact-view.active {
        display: block;
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
      }

      .code-view {
        height: 100%;
        margin: 0;
        padding: 18px;
        overflow: auto;
        background: #0f172a;
        color: #e2e8f0;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.7;
      }

      .history-list {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100%;
        overflow: auto;
      }

      .history-item {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
        background: #fff;
      }

      .history-item.active {
        border-color: #93c5fd;
        background: #eff6ff;
      }

      .tip {
        font-size: 12px;
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        background: #fff;
        border-radius: 12px;
        padding: 12px 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
        border-left: 4px solid var(--success);
        font-size: 13px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .typing {
        display: inline-flex;
        gap: 5px;
        padding: 2px 0;
      }

      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #94a3b8;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.18s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.55;
        }
        50% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <nav id="left-nav">
      <div
        style="display:flex;align-items:center;padding:0 16px;margin-bottom:18px;height:36px;min-width:228px;"
      >
        <div
          style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,.28);"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M12 2L4 7l8 5 8-5-8-5z"></path>
            <path d="M4 12l8 5 8-5"></path>
            <path d="M4 17l8 5 8-5"></path>
          </svg>
        </div>
        <span class="nav-label" style="font-size:15px;font-weight:700;color:#0f172a;margin-left:10px;"
          >Lysmata</span
        >
      </div>

      <button class="nav-btn" onclick="window.open('ui-bot-management.html','_blank')">
        <div class="nav-icon-wrap">🤖</div>
        <span class="nav-label">助手工坊</span>
      </button>
      <button class="nav-btn" onclick="window.open('ui-private-chat.html','_blank')">
        <div class="nav-icon-wrap">💬</div>
        <span class="nav-label">私聊</span>
      </button>
      <button class="nav-btn" onclick="window.open('ui-group-chat.html','_blank')">
        <div class="nav-icon-wrap">👥</div>
        <span class="nav-label">群聊</span>
      </button>
      <button class="nav-btn active">
        <div class="nav-icon-wrap">🧩</div>
        <span class="nav-label">Artifact</span>
      </button>

      <div class="nav-bottom">
        <button class="nav-btn" onclick="window.open('ui-settings.html','_blank')">
          <div class="nav-icon-wrap">⚙️</div>
          <span class="nav-label">设置</span>
        </button>
        <button class="nav-btn" onclick="toggleNav()">
          <div class="nav-icon-wrap" id="nav-toggle-icon">⇆</div>
          <span class="nav-label" id="nav-toggle-label">展开导航</span>
        </button>
      </div>
    </nav>

    <div class="layout">
      <aside class="conversation-rail">
        <div style="padding:16px;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <div class="section-title">Artifact 体验</div>
            <span class="badge badge-phase">Phase 2</span>
          </div>
          <div class="muted" style="font-size:12px;line-height:1.6;">
            当消息中出现可渲染内容时，右侧面板自动滑出，聊天区同步压缩。
          </div>
        </div>

        <div style="padding:10px;display:flex;flex-direction:column;gap:10px;overflow:auto;">
          <div class="conv-item active">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
              <div>
                <div style="font-size:14px;font-weight:600;">营销落地页改版</div>
                <div class="muted" style="font-size:12px;margin-top:4px;">当前已生成 1 个 Artifact</div>
              </div>
              <span class="badge badge-artifact">已激活</span>
            </div>
          </div>

          <div class="conv-item">
            <div style="font-size:14px;font-weight:600;">数据看板原型</div>
            <div class="muted" style="font-size:12px;margin-top:4px;">等待新的可渲染内容</div>
          </div>
        </div>
      </aside>

      <div id="chat-shell" class="chat-shell has-artifact">
        <section class="chat-pane">
          <div
            style="padding:16px 18px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;"
          >
            <div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <div class="section-title">与通用助手对话</div>
                <span class="badge badge-artifact">已识别 Artifact</span>
              </div>
              <div class="muted" style="font-size:12px;margin-top:4px;">
                气泡中会出现“已生成 Artifact”卡片，点击即可聚焦右侧面板。
              </div>
            </div>
            <button class="ghost-btn" onclick="focusArtifact()">聚焦当前 Artifact</button>
          </div>

          <div id="msg-list" style="flex:1;overflow:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:18px;"></div>

          <div class="input-shell">
            <div id="artifact-context-tip" style="margin-bottom:8px;" class="tip"></div>
            <div class="input-box">
              <textarea
                id="chat-input"
                placeholder="针对当前 Artifact 发送修改指令，例如：把主视觉背景改成深色并突出 CTA"
                oninput="resizeInput()"
              ></textarea>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
                <div style="display:flex;gap:8px;align-items:center;">
                  <button class="ghost-btn" onclick="setQuickPrompt('把背景改成深色，并增强按钮对比度')">
                    深色改版
                  </button>
                  <button class="ghost-btn" onclick="setQuickPrompt('把卖点区改成三列卡片，并补一行说明')">
                    调整布局
                  </button>
                </div>
                <button class="primary-btn" onclick="sendMessage()">发送迭代</button>
              </div>
            </div>
            <div class="tip" style="text-align:center;margin-top:8px;">
              当前示意的是“围绕当前 Artifact 连续迭代”的对话方式，而不是独立工具页。
            </div>
          </div>
        </section>

        <aside class="artifact-panel">
          <div
            style="padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;"
          >
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <div id="artifact-title" class="section-title">Artifact 面板</div>
                <span class="badge badge-artifact">自动触发</span>
              </div>
              <div id="artifact-meta" class="muted" style="font-size:12px;margin-top:4px;"></div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0;">
              <button class="icon-btn" onclick="copyCode()" title="复制代码">⧉</button>
              <button class="icon-btn" onclick="toggleFullscreen()" title="全屏切换">⛶</button>
              <button class="icon-btn" onclick="closeArtifact()" title="关闭面板">✕</button>
            </div>
          </div>

          <div class="tabs">
            <div id="tab-preview" class="tab active" onclick="switchTab('preview')">Preview</div>
            <div id="tab-code" class="tab" onclick="switchTab('code')">Code</div>
            <div id="tab-history" class="tab" onclick="switchTab('history')">History</div>
          </div>

          <div class="artifact-body">
            <div id="view-preview" class="artifact-view active">
              <iframe id="preview-frame" class="preview-frame" title="artifact preview"></iframe>
            </div>
            <div id="view-code" class="artifact-view">
              <pre id="code-view" class="code-view"></pre>
            </div>
            <div id="view-history" class="artifact-view">
              <div id="history-list" class="history-list"></div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const messages = [
        {
          id: "m1",
          sender: "user",
          content: "帮我做一个简洁的产品落地页，突出 AI 助手工坊、首次成功和模板创建。",

        {

          sender: "bot",

          artifactId: "artifact-landing",
        },
      ];

          type: "HTML",

            {

              label: "版本 1",
              summary: "首版结构：Hero + 模板卖点 + 首次成功说明",
              createdAt: "刚刚",

                  <body>
                    <div class="hero">

              code: `<section class="hero">
  <h1>Lysmata，让第一次成功更容易发生</h1>
  <p>从模板创建助手，到真实开始对话，再到逐步进入高级能力，整个过程都围绕“先用起来”设计。</p>
  <button>立即创建第一个助手</button>
</section>

<section class="grid">
  <article class="card">模板优先</article>
  <article class="card">首次成功</article>
  <article class="card">持续迭代</article>
</section>`,
            },
          ],
        },
      };

      let activeArtifactId = "artifact-landing";
      let activeTab = "preview";
      let activeVersionId = "v1";
      let navExpanded = false;
      let toastTimer;

      function toggleNav() {
        navExpanded = !navExpanded;
        document.getElementById("left-nav").classList.toggle("expanded", navExpanded);
      }

      function getActiveArtifact() {
        return artifacts[activeArtifactId];
      }

      function getActiveVersion() {
        const artifact = getActiveArtifact();
        return artifact.versions.find((item) => item.id === activeVersionId) || artifact.versions[0];
      }

      function renderMessages() {
        const list = document.getElementById("msg-list");
        list.innerHTML = "";

        messages.forEach((message) => {
          const row = document.createElement("div");
          row.className = "msg-row";
          row.style.alignItems = message.sender === "user" ? "flex-end" : "flex-start";

          const bubble = document.createElement("div");
          bubble.className = message.sender === "user" ? "bubble-user" : "bubble-bot";
          bubble.innerHTML = message.content.replace(/\n/g, "<br>");
          row.appendChild(bubble);

          if (message.artifactId) {
            const card = document.createElement("div");
            card.className = "artifact-card";
            card.onclick = () => focusArtifact(message.artifactId);
            card.innerHTML = `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
                <div>
                  <div style="font-size:13px;font-weight:700;color:#1d4ed8;">已生成 Artifact</div>
                  <div class="muted" style="font-size:12px;margin-top:4px;">点击聚焦右侧面板，查看预览 / 源码 / 历史</div>
                </div>
                <span class="badge badge-artifact">可继续迭代</span>
              </div>
              <div class="artifact-thumb">
                <div class="artifact-mini-ui">
                  <div class="mini-top"></div>
                  <div class="mini-row"></div>
                  <div class="mini-row short"></div>
                  <div class="mini-grid">
                    <div class="mini-box"></div>
                    <div class="mini-box"></div>
                    <div class="mini-box"></div>
                  </div>
                </div>
              </div>
            `;
            row.appendChild(card);
          }

          const meta = document.createElement("div");
          meta.className = "tip";
          meta.style.marginTop = "2px";
          meta.textContent = message.sender === "user" ? "你 · 刚刚" : "通用助手 · 刚刚";
          row.appendChild(meta);

          list.appendChild(row);
        });

        list.scrollTop = list.scrollHeight;
      }

      function renderArtifactPanel() {
        const artifact = getActiveArtifact();
        const version = getActiveVersion();

        document.getElementById("artifact-title").textContent = artifact.title;
        document.getElementById("artifact-meta").textContent =
          `${artifact.type} · 当前展示 ${version.label} · ${artifact.versions.length} 个历史版本`;
        document.getElementById("preview-frame").srcdoc = version.preview;
        document.getElementById("code-view").textContent = version.code;

        document.getElementById("history-list").innerHTML = artifact.versions
          .slice()
          .reverse()
          .map((item) => {
            const active = item.id === activeVersionId;
            return `
              <div class="history-item${active ? " active" : ""}" onclick="restoreVersion('${item.id}')">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                  <div style="font-size:13px;font-weight:600;">${item.label}</div>
                  <div class="tip">${item.createdAt}</div>
                </div>
                <div class="muted" style="font-size:12px;line-height:1.6;margin-top:6px;">${item.summary}</div>
              </div>
            `;
          })
          .join("");

        document.getElementById("artifact-context-tip").textContent =
          `当前已激活「${artifact.title}」，输入框会默认把你的指令理解为针对当前 Artifact 的修改。`;
      }

      function switchTab(tab) {
        activeTab = tab;
        ["preview", "code", "history"].forEach((name) => {
          document.getElementById(`tab-${name}`).classList.toggle("active", name === tab);
          document.getElementById(`view-${name}`).classList.toggle("active", name === tab);
        });
      }

      function focusArtifact(id = activeArtifactId) {
        activeArtifactId = id;
        document.getElementById("chat-shell").classList.add("has-artifact");
        renderArtifactPanel();
        showToast("已聚焦当前 Artifact");
      }

      function closeArtifact() {
        document.getElementById("chat-shell").classList.remove("has-artifact");
      }

      function toggleFullscreen() {
        document.getElementById("chat-shell").classList.toggle("fullscreen");
      }

      function restoreVersion(versionId) {
        activeVersionId = versionId;
        renderArtifactPanel();
        switchTab("preview");
        showToast("已切换到选中的历史版本");
      }

      function copyCode() {
        showToast("已复制当前 Code 视图内容");
      }

      function setQuickPrompt(text) {
        document.getElementById("chat-input").value = text;
        resizeInput();
      }

      function resizeInput() {
        const input = document.getElementById("chat-input");
        input.style.height = "auto";
        input.style.height = `${Math.min(input.scrollHeight, 120)}px`;
      }

      function sendMessage() {
        const input = document.getElementById("chat-input");
        const value = input.value.trim();
        if (!value) return;

        messages.push({ id: `u-${Date.now()}`, sender: "user", content: value });
        messages.push({
          id: `b-loading-${Date.now()}`,
          sender: "bot",
          content: '<div class="typing"><span></span><span></span><span></span></div>',
        });

        input.value = "";
        resizeInput();
        renderMessages();
        focusArtifact();

        setTimeout(() => {
          messages.pop();

          const artifact = getActiveArtifact();
          const nextIndex = artifact.versions.length + 1;
          const nextId = `v${nextIndex}`;
          const nextPreview = `
            <!doctype html>
            <html lang="zh-CN">
              <head>
                <style>
                  body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0f172a;color:#e2e8f0}
                  .hero{padding:48px 40px;background:linear-gradient(135deg,#0f172a,#1e3a8a)}
                  .hero h1{margin:0 0 10px;font-size:34px}
                  .hero p{margin:0;color:#cbd5e1;max-width:700px;line-height:1.7}
                  .cta{display:inline-block;margin-top:18px;padding:10px 16px;border-radius:999px;background:#38bdf8;color:#082f49;font-weight:700}
                  .section{padding:30px 40px;background:#111827}
                  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
                  .card{background:#172554;border:1px solid rgba(148,163,184,.24);border-radius:16px;padding:18px}
                  .card h3{margin:0 0 8px;font-size:18px;color:#f8fafc}
                  .card p{margin:0;color:#cbd5e1;line-height:1.6}
                </style>
              </head>
              <body>
                <div class="hero">
                  <h1>Lysmata，把首次成功变成默认体验</h1>
                  <p>现在主视觉已调整为深色风格，并进一步强化“模板创建 + 对话验证 + 后续迭代”的连续心智。</p>
                  <div class="cta">立即体验助手工坊</div>
                </div>
                <div class="section">
                  <div class="grid">
                    <div class="card"><h3>更强对比</h3><p>通过深色背景和高亮 CTA，首屏注意力更集中。</p></div>
                    <div class="card"><h3>围绕模板展开</h3><p>把模板与首次成功路径合并表达，减少配置型感知。</p></div>
                    <div class="card"><h3>支持持续修改</h3><p>当前所有调整都可以继续沿着这个 Artifact 滚动迭代。</p></div>
                  </div>
                </div>
              </body>
            </html>
          `;

          const nextCode = `<section class="hero hero-dark">
  <h1>Lysmata，把首次成功变成默认体验</h1>
  <p>现在主视觉已调整为深色风格，并进一步强化“模板创建 + 对话验证 + 后续迭代”的连续心智。</p>
  <button>立即体验助手工坊</button>
</section>

<section class="grid dark">
  <article class="card">更强对比</article>
  <article class="card">围绕模板展开</article>
  <article class="card">支持持续修改</article>
</section>`;

          artifact.versions.push({
            id: nextId,
            label: `版本 ${nextIndex}`,
            summary: `根据指令更新：${value}`,
            createdAt: "刚刚",
            preview: nextPreview,
            code: nextCode,
          });
          activeVersionId = nextId;

          messages.push({
            id: `b-${Date.now()}`,
            sender: "bot",
            content:
              "已基于当前 Artifact 生成新版。我保留了原有结构，只把主视觉改成深色，并增强了 CTA 和卖点区的表达。你可以继续在当前上下文里追加修改。",
            artifactId: artifact.id,
          });

          renderMessages();
          renderArtifactPanel();
          switchTab("preview");
          showToast("Artifact 已生成新版本");
        }, 1100);
      }

      function showToast(text) {
        const toast = document.getElementById("toast");
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          document.getElementById("chat-shell").classList.remove("fullscreen");
        }
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          sendMessage();
        }
      });

      renderMessages();
      renderArtifactPanel();
      resizeInput();
    </script>
  </body>
</html>
