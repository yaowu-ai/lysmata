<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step 8 · 开始对话 — Lysmata 首次成功向导</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f5f7fb;--surface:#fff;--surface-muted:#f8fafc;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--primary:#2563eb;--primary-hover:#1d4ed8;--success:#16a34a; }
    *{box-sizing:border-box;font-family:"Inter",system-ui,sans-serif;}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#dbeafe 0,transparent 24%),linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:28px;}
    .wizard-shell{width:980px;min-height:700px;background:var(--surface);border:1px solid rgba(226,232,240,.9);border-radius:24px;box-shadow:0 24px 80px rgba(15,23,42,.16);overflow:hidden;display:flex;flex-direction:column;}
    .wizard-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;padding:24px 28px 18px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.92);backdrop-filter:blur(8px);}
    .brand-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .brand-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;box-shadow:0 10px 24px rgba(37,99,235,.25);}
    .brand-copy h1{margin:0;font-size:18px;font-weight:700;}
    .brand-copy p{margin:4px 0 0;font-size:13px;color:var(--text-muted);}
    .stepper{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .step-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:600;}
    .step-chip.active{border-color:#bfdbfe;background:#eff6ff;color:var(--primary);}
    .step-chip.done{border-color:#bbf7d0;background:#f0fdf4;color:#15803d;}
    .step-index{width:20px;height:20px;border-radius:50%;background:#f1f5f9;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
    .step-chip.active .step-index{background:#dbeafe;}
    .step-chip.done .step-index{background:#dcfce7;}
    .icon-button{width:34px;height:34px;border:none;border-radius:10px;background:transparent;color:#94a3b8;cursor:pointer;}
    .icon-button:hover{background:#f1f5f9;color:var(--text);}
    .wizard-content{flex:1;padding:28px;overflow-y:auto;display:flex;align-items:center;}
    .ready-hero{max-width:760px;margin:0 auto;text-align:center;}
    .ready-icon{width:84px;height:84px;margin:0 auto 18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,#dcfce7,#bbf7d0);}
    .ready-hero h2{margin:0 0 12px;font-size:34px;}
    .ready-hero p{margin:0 auto 22px;max-width:560px;font-size:15px;line-height:1.75;color:var(--text-muted);}
    .button{border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s,background .15s;}
    .button:active{transform:translateY(1px);}
    .button.primary{background:var(--primary);color:#fff;}
    .button.primary:hover{background:var(--primary-hover);}
    .button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
    .button.link{background:transparent;color:var(--text-muted);padding:0;font-size:13px;}
    .button.link:hover{color:var(--text);}
    @media(max-width:1100px){body{padding:0;}.wizard-shell{width:100vw;min-height:100vh;border-radius:0;border:none;}}
  </style>
</head>
<body>
<div class="wizard-shell">
  <div class="wizard-header">
    <div>
      <div class="brand-row">
        <div class="brand-logo">L</div>
        <div class="brand-copy">
          <h1>Lysmata 首次成功向导</h1>
          <p>安装 OpenClaw、连接 AI 服务、创建第一个助手，并立刻开始第一次对话。</p>
        </div>
      </div>
      <div class="stepper">
        <div class="step-chip done"><span class="step-index">✓</span><span>检查环境</span></div>
        <div class="step-chip done"><span class="step-index">✓</span><span>安装 OpenClaw</span></div>
        <div class="step-chip done"><span class="step-index">✓</span><span>连接 AI 服务</span></div>
        <div class="step-chip done"><span class="step-index">✓</span><span>选择模板</span></div>
        <div class="step-chip done"><span class="step-index">✓</span><span>创建助手</span></div>
        <div class="step-chip active"><span class="step-index">6</span><span>开始对话</span></div>
      </div>
    </div>
    <div>
      <button class="icon-button" onclick="window.location.href='ui-bot-management.html'">✕</button>
    </div>
  </div>

  <main class="wizard-content">
    <div class="ready-hero">
      <div class="ready-icon" id="ready-avatar">✨</div>
      <h2>你的第一个助手已经可以开始使用了。</h2>
      <p>
        <strong id="ready-name">我的第一个助手</strong> 已根据
        <strong id="ready-template">通用助手</strong>
        模板创建完成。现在你可以直接进入第一次对话，把 OpenClaw 真正用起来。
      </p>
      <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
        <button class="button primary" onclick="window.location.href='ui-private-chat.html'">立即开始对话</button>
        <button class="button secondary" onclick="window.location.href='ui-bot-management.html'">先回助手工坊</button>
      </div>
      <br/>
      <button class="button link" onclick="window.location.href='us-01-onboarding-1-intro.html'">重新运行首次成功向导</button>
    </div>
  </main>
  <!-- ready 步骤无 footer -->
</div>

<script>
  document.getElementById('ready-avatar').textContent = sessionStorage.getItem('assistantAvatar') || '✨';
  document.getElementById('ready-name').textContent = sessionStorage.getItem('assistantName') || '我的第一个助手';
  document.getElementById('ready-template').textContent = sessionStorage.getItem('selectedTemplate') || '通用助手';
</script>
</body>
</html>
